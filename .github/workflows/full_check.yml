 fix/collect-consistency-default-single
﻿name: full_check

name: full_check
 main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  full_check:
    name: full_check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create venv and install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe --version
          if (Test-Path .\requirements.txt) {
            .\.venv\Scripts\python.exe -m pip install --upgrade pip
            .\.venv\Scripts\python.exe -m pip install -r .\requirements.txt
          } else {
            Write-Host "requirements.txt not found, skip dependency install"
          }

      - name: Run full_check script
        shell: pwsh
        run: |
 fix/collect-consistency-default-single
          Remove-Item Env:COLLECT_DIRS -ErrorAction SilentlyContinue
          . .\.venv\Scripts\Activate.ps1
          python --version
          python -m pytest --version
          .\scripts\full_check.ps1

          .\.venv\Scripts\python.exe --version
          powershell -ExecutionPolicy Bypass -File .\scripts\full_check.ps1
 main
          $rc = $LASTEXITCODE
          Write-Host "full_check exit code: $rc"
          if ($rc -ne 0) { exit $rc }
